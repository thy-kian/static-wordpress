name: Claude Code - issue to PR

on:
  issues:
    types: [opened, labeled]

jobs:
  claude:
    if: |
      github.event.action == 'opened' ||
      github.event.label.name == 'claude'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            Issue title: ${{ github.event.issue.title }}
            Issue body: ${{ github.event.issue.body }}
            Read the issue carefully, find the relevant file, and make the requested changes.
            Then create a new branch named fix/issue-${{ github.event.issue.number }}, commit your changes to that branch, push it, and open a Pull Request into main with a clear title and description referencing this issue.
            Do NOT commit directly to main.
