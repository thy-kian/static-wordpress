name: Open PR after Claude commit

on:
  push:
    branches-ignore:
      - main
      - riptus-local

jobs:
  open-pr:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: riptus-local
          title: "fix: ${{ github.event.head_commit.message }}"
          body: |
            Auto-generated PR by Claude Code.
            Closes the linked issue on merge.
          draft: false

      - name: Enable auto-merge
        run: gh pr merge --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}